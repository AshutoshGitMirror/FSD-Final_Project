services:
  - type: web
    name: fsd-final-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEYS
        sync: false

  - type: web
    name: fsd-final-linksbackend
    env: python
    plan: free
    rootDir: LinksBackend
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: fsd-final-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_LINKS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
